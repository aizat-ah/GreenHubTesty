name: greenhub
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  firebase_app_check: 0.4.2

  # State Management
  flutter_riverpod: ^3.3.1

  # Navigation
  go_router: ^17.2.0

  # Utilities
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  uuid: ^4.5.3

  # UI
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
